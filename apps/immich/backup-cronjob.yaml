apiVersion: batch/v1
kind: CronJob
metadata:
  name: immich-backup
  namespace: app
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        spec:
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
          initContainers:
          - name: pg-dump
            image: tensorchord/pgvecto-rs:pg16-v0.4.0
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            command:
            - /bin/sh
            - -c
            - |
              set -e
              echo "Starting PostgreSQL dump at $(date)"
              PGPASSWORD="$DB_PASSWORD" pg_dump \
                -h database \
                -U "$DB_USERNAME" \
                -d immich \
                --format=custom \
                --compress=9 \
                -f /backup/immich-db.dump
              echo "Database dump completed: $(ls -lh /backup/immich-db.dump)"
            env:
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: immich-db-credentials
                  key: DB_PASSWORD
            volumeMounts:
            - name: backup-staging
              mountPath: /backup
            resources:
              limits:
                memory: "512Mi"
                cpu: "500m"
              requests:
                memory: "256Mi"
                cpu: "100m"
          containers:
          - name: backup
            image: restic/restic:0.19.1
            securityContext:
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            command:
            - /bin/sh
            - -c
            - |
              set -e
              export RESTIC_REPOSITORY="s3:${B2_ENDPOINT}/${B2_BUCKET}/${BACKUP_PATH}"
              echo "Starting Immich backup at $(date)"

              # Initialize repository if it doesn't exist
              restic snapshots &>/dev/null || {
                echo "Initializing restic repository..."
                restic init
              }

              # Backup database dump
              echo "Backing up database..."
              restic backup /backup \
                --tag immich \
                --tag database \
                --tag automated \
                --host immich-k8s \
                --verbose

              # Backup media library
              echo "Backing up media library..."
              restic backup /library \
                --tag immich \
                --tag media \
                --tag automated \
                --host immich-k8s \
                --verbose

              # Show backup statistics
              echo "Backup completed. Current snapshots:"
              restic snapshots

              # Prune old backups based on retention policy
              echo "Pruning old backups..."
              restic forget \
                --keep-daily 7 \
                --keep-weekly 4 \
                --keep-monthly 6 \
                --prune \
                --tag automated

              # Check repository integrity (quick check)
              echo "Checking repository integrity..."
              restic check --read-data-subset=1%

              echo "Backup job completed successfully at $(date)"
            env:
            - name: B2_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: b2-credentials
                  key: b2-endpoint
            - name: B2_BUCKET
              valueFrom:
                secretKeyRef:
                  name: b2-credentials
                  key: b2-bucket
            - name: BACKUP_PATH
              value: "immich"
            - name: RESTIC_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: b2-credentials
                  key: restic-password
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: b2-credentials
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: b2-credentials
                  key: aws-secret-access-key
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: b2-credentials
                  key: aws-region
            - name: RESTIC_CACHE_DIR
              value: "/cache"
            volumeMounts:
            - name: backup-staging
              mountPath: /backup
              readOnly: true
            - name: library
              mountPath: /library
              readOnly: true
            - name: cache
              mountPath: /cache
            resources:
              limits:
                memory: "1Gi"
                cpu: "1000m"
              requests:
                memory: "512Mi"
                cpu: "200m"
          restartPolicy: OnFailure
          volumes:
          - name: backup-staging
            emptyDir: {}
          - name: library
            persistentVolumeClaim:
              claimName: immich-library
          - name: cache
            emptyDir: {}
