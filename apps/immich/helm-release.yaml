apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: immich
  namespace: app
spec:
  interval: 1m
  chart:
    spec:
      chart: immich
      version: "0.11.1"
      sourceRef:
        kind: HelmRepository
        name: immich
        namespace: app
  values:
    valkey:
      enabled: true

    immich:
      persistence:
        library:
          existingClaim: immich-library

    defaultPodOptions:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - beholder

    controllers:
      main:
        containers:
          main:
            image:
              tag: v2.7.5
            env:
              REDIS_HOSTNAME: immich-valkey
              IMMICH_MACHINE_LEARNING_URL: http://immich-machine-learning:3003
              DB_HOSTNAME: database
              DB_DATABASE_NAME: immich
              DB_USERNAME:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: DB_USERNAME
              DB_PASSWORD:
                valueFrom:
                  secretKeyRef:
                    name: immich-db-credentials
                    key: DB_PASSWORD

    server:
      ingress:
        main:
          enabled: false

    machine-learning:
      persistence:
        cache:
          type: persistentVolumeClaim
          size: 10Gi
          storageClassName: longhorn
          accessMode: ReadWriteOnce
