apiVersion: apps/v1
kind: Deployment
metadata:
  name: transmission
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: transmission
  template:
    metadata:
      labels:
        app: transmission
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - beholder
      securityContext:
        fsGroup: 1000
      containers:
      - name: transmission
        image: linuxserver/transmission:4.1.2
        securityContext:
          readOnlyRootFilesystem: false
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          exec:
            command:
            - /scripts/check.sh
            - /downloads
          initialDelaySeconds: 60
          periodSeconds: 60
          timeoutSeconds: 30
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /transmission/web/
            port: 9091
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 30
          failureThreshold: 5
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Australia/Adelaide"
        ports:
        - name: web
          containerPort: 9091
          protocol: TCP
        - name: torrent
          containerPort: 51413
          protocol: TCP
        - name: torrent-udp
          containerPort: 51413
          protocol: UDP
        volumeMounts:
        - name: config
          mountPath: /config
        - name: downloads
          mountPath: /downloads
        - name: nfs-healthcheck
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: transmission
      - name: downloads
        persistentVolumeClaim:
          claimName: transmission-downloads
      - name: nfs-healthcheck
        configMap:
          name: nfs-healthcheck
          defaultMode: 0755