apiVersion: apps/v1
kind: Deployment
metadata:
  name: unifi-mongodb
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: unifi-mongodb
  template:
    metadata:
      labels:
        app: unifi-mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:8.2
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: unifi-credentials
              key: MONGO_USER
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: unifi-credentials
              key: MONGO_PASS
        - name: MONGO_INITDB_DATABASE
          value: "unifi"
        ports:
        - containerPort: 27017
          name: mongodb
        volumeMounts:
        - name: mongodb-data
          mountPath: /data/db
      volumes:
      - name: mongodb-data
        persistentVolumeClaim:
          claimName: unifi-mongodb-data-longhorn
---
apiVersion: v1
kind: Service
metadata:
  name: unifi-mongodb
spec:
  selector:
    app: unifi-mongodb
  ports:
  - port: 27017
    targetPort: 27017
    protocol: TCP