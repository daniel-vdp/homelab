apiVersion: apps/v1
kind: Deployment
metadata:
  name: syncthing
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: syncthing
  template:
    metadata:
      labels:
        app: syncthing
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - beholder
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: syncthing
        image: syncthing/syncthing:2.0.16
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
        resources:
          limits:
            memory: "1Gi"
            cpu: "1000m"
          requests:
            memory: "256Mi"
            cpu: "100m"
        livenessProbe:
          exec:
            command:
            - /scripts/check.sh
            - /var/syncthing
            - http://localhost:8384/rest/noauth/health
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /rest/noauth/health
            port: 8384
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Australia/Adelaide"
        - name: STHOMEDIR
          value: "/config"
        ports:
        - name: web-ui
          containerPort: 8384
          protocol: TCP
        - name: sync
          containerPort: 22000
          protocol: TCP
        - name: discovery
          containerPort: 21027
          protocol: UDP
        volumeMounts:
        - name: config
          mountPath: /config
        - name: mnt
          mountPath: /var/syncthing
        - name: nfs-healthcheck
          mountPath: /scripts
          readOnly: true
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: syncthing
      - name: mnt
        persistentVolumeClaim:
          claimName: syncthing-mnt
      - name: nfs-healthcheck
        configMap:
          name: nfs-healthcheck
          defaultMode: 0755
