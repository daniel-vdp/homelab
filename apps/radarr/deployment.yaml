apiVersion: apps/v1
kind: Deployment
metadata:
  name: radarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: radarr
  template:
    metadata:
      labels:
        app: radarr
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: kubernetes.io/hostname
                operator: NotIn
                values:
                - beholder
      securityContext:
        fsGroup: 1000
      containers:
        - name: radarr
          image: linuxserver/radarr:6.3.0
          securityContext:
            readOnlyRootFilesystem: false
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            exec:
              command:
              - /scripts/check.sh
              - /downloads
              - http://localhost:7878/ping
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /ping
              port: 7878
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
          env:
            - name: TZ
              value: "Australia/Adelaide"
            - name: PUID
              value: "1000"
            - name: PGID
              value: "1000"
          ports:
            - name: web
              containerPort: 7878
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /config
            - name: data
              mountPath: /data
            - name: downloads
              mountPath: /downloads
            - name: nfs-healthcheck
              mountPath: /scripts
              readOnly: true
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: radarr
        - name: data
          persistentVolumeClaim:
            claimName: radarr-data
        - name: downloads
          persistentVolumeClaim:
            claimName: radarr-downloads
        - name: nfs-healthcheck
          configMap:
            name: nfs-healthcheck
            defaultMode: 0755
