apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: traefik-routes
  namespace: flux-system
spec:
  interval: 1m
  path: ./apps/traefik-routes
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: infra
  dependsOn:
    - name: traefik
